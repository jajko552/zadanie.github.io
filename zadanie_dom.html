<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>zadanie DOM</title>
</head>
<body>
 
<img id="img" src="https://www.razaoautomovel.com/wp-content/uploads/2023/05/abt-audi-rs6-legacy-edition-2_925x520_acf_cropped-925x520.jpg">
 
<button id="guzik">Kliknij</button>
 
<input id="treść" value="Przykładowa treść">
 
<a id="a" href="https://google.com">Link</a>
 
<p id="p" class="Moja_klasa">Paragraf</p>
 
<script>
    //Obrazek
    console.log(document.getElementById("img").src);
    //Guzik
    document.getElementById("guzik").disabled = true;
    document.getElementById("guzik").innerText = "Zablokowany";
    //Input
    console.log(document.getElementById("treść").getAttribute("value"));
    console.log(document.getElementById("treść").value);
    //Link
    document.getElementById("a").hasAttribute("target");
    document.getElementById("a").target = "_blank";
    //Klasa
    document.getElementById("p").removeAttribute("class");
    console.log(document.getElementById("p").className);
</script>
 
</body>
</html>
