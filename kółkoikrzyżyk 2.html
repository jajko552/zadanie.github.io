<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kółko i Krzyżyk</title>
 
<style>
body {
  font-family: Arial;
  text-align: center;
}
 
.board {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  grid-template-rows: repeat(3, 100px);
  gap: 5px;
  justify-content: center;
  margin: 20px auto;
}
 
.cell {
  font-size: 40px;
}
</style>
</head>
 
<body>
 
<h1>Kółko i Krzyżyk</h1>
 
<label>
  <input type="checkbox" id="komputer">
  Komputer zaczyna
</label>
 
<br><br>
 
<button id="reset">Reset</button>
 
<p id="wynik"></p>
 
<div class="board">
  <button class="cell"></button>
  <button class="cell"></button>
  <button class="cell"></button>
 
  <button class="cell"></button>
  <button class="cell"></button>
  <button class="cell"></button>
 
  <button class="cell"></button>
  <button class="cell"></button>
  <button class="cell"></button>
</div>
 
<script>

const cells = document.querySelectorAll(".cell");
const resetBtn = document.getElementById("reset");
const wynik = document.getElementById("wynik");
const komputer = document.getElementById("komputer");
// klik gracza
cells.forEach(function(cell) {
 
  cell.addEventListener("click", function() {
 
    cell.textContent = "X";
 
    sprawdz();
 
    ruchKomputera();
 
  });
});
// ruch komputera (losowe pole)
function ruchKomputera() {
 
  let los;
 
  do {
    los=Math.floor(Math.random() * 9);
  } while (cells[los].textContent !== "");
  cells[los].textContent = "0";
  sprawdz();
}
// sprawdzanie wygranej
function sprawdz() {
  // poziome
  if (cells[0].textContent === "X" && cells[1].textContent === "X" && cells[2].textContent === "X")
    wynik.textContent = "Wygrałeś";
 
  if (cells[3].textContent === "X" && cells[4].textContent === "X" && cells[5].textContent === "X")
    wynik.textContent = "Wygrałeś";
 
  if (cells[6].textContent === "X" && cells[7].textContent === "X" && cells[8].textContent === "X")
    wynik.textContent = "Wygrałeś";
 
  // dla O
  if (cells[0].textContent === "O" && cells[1].textContent === "O" && cells[2].textContent === "O")
    wynik.textContent = "Przegrałeś";
 
  if (cells[3].textContent === "O" && cells[4].textContent === "O" && cells[5].textContent === "O")
    wynik.textContent = "Przegrałeś";
 
  if (cells[6].textContent === "O" && cells[7].textContent === "O" && cells[8].textContent === "O")
    wynik.textContent = "Przegrałeś";
}
// reset
resetBtn.addEventListener("click", function() {
 
  cells.forEach(function(cell) {
    cell.textContent = "";
  });
 
  wynik.textContent = "";
 
  if (komputer.checked) {
    ruchKomputera();
  }
});
</script>
</body>
</html>
